name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sanitizar el nombre del repo: minúsculas y sin guión final
      - name: Sanitize image name
        id: image
        run: |
          RAW="${{ github.repository }}"
          CLEAN=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | sed 's/-*$//')
          echo "name=ghcr.io/${CLEAN}" >> $GITHUB_OUTPUT
          echo "Imagen: ghcr.io/${CLEAN}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Deployment summary
        run: |
          echo "## ✅ Imagen publicada" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.image.outputs.name }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Watchtower actualizará el contenedor en ~30 segundos." >> $GITHUB_STEP_SUMMARY
