# ============================================================
# CI/CD Pipeline — Build & Push Docker Image a GitHub Container Registry
#
# Flujo:
#   1. Se dispara en cada push a `main`
#   2. Hace checkout del código
#   3. Construye la imagen Docker (multi-stage Dockerfile)
#   4. La sube a ghcr.io (GitHub Container Registry)
#   5. Watchtower en el servidor detecta la nueva imagen y reinicia el contenedor
#
# REQUISITOS (configurar en GitHub → Settings → Secrets and variables → Actions):
#   No se necesitan secrets adicionales — GitHub provee GITHUB_TOKEN automáticamente
#   con permisos para escribir en ghcr.io.
# ============================================================

name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main
  # Permitir disparo manual desde la UI de GitHub Actions
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Nombre de la imagen en minúsculas (requerido por ghcr.io)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    # Permisos para escribir en GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Obtener el código fuente
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar QEMU (para builds multi-arquitectura si es necesario)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Configurar Docker Buildx (builder avanzado con caché)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Login a GitHub Container Registry usando el token automático
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Extraer metadatos para tags y labels de la imagen
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag 'latest' siempre al hacer push a main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag con el SHA corto del commit para trazabilidad
            type=sha,prefix=sha-,format=short

      # 6. Build y Push con caché para acelerar builds sucesivos
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Caché con GitHub Actions Cache para builds más rápidos
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args para Next.js (sin secretos — las API keys van en runtime)
          build-args: |
            NODE_ENV=production

      # 7. Resumen del deploy en el log de GitHub Actions
      - name: Deployment summary
        run: |
          echo "## ✅ Imagen publicada exitosamente" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Rama:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Watchtower detectará la nueva imagen en ~30 segundos y reiniciará el contenedor." >> $GITHUB_STEP_SUMMARY
