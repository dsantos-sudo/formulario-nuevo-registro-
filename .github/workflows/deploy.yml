name: CI/CD Formulario Registro Odoo (GitHub Packages)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dsantos-sudo/formulario-nuevo-registro
  BUILDKIT_PROGRESS: plain

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Descarga del código
        uses: actions/checkout@v3

      - name: Configuración de Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalación de dependencias
        run: npm ci --verbose

      - name: Construcción de prueba (Dry Run)
        run: npm run build

  deployment:
    needs: integration
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descarga del código
        uses: actions/checkout@v3

      - name: Configuración de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Autenticación en GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extracción de metadatos (tags)
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch

      - name: Construcción y publicación de imagen en GitHub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
